name: Build Release

# 手動実行のみ。既定ブランチ(main)を選んで実行すること。
# package.json の version を読み、その値でタグ・Release を作成し、
# zip / unitypackage / package.json を Release に添付する。
# VPM リスティング(package-list-action)は Release に添付された package.json を辿る。
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # package.json から name / version を取得（このリポジトリのルートがパッケージ本体）
      - name: Get Package Name
        id: pkgName
        uses: zoexx/github-action-json-file-properties@b9f36ce6ee6fe2680cd3c32b2c62e22eade7e590
        with:
          file_path: "package.json"
          prop_path: "name"

      - name: Get Version
        id: version
        uses: zoexx/github-action-json-file-properties@b9f36ce6ee6fe2680cd3c32b2c62e22eade7e590
        with:
          file_path: "package.json"
          prop_path: "version"

      - name: Set Environment Variables
        run: |
          echo "zipFile=${{ runner.temp }}/${{ steps.pkgName.outputs.value }}-${{ steps.version.outputs.value }}.zip" >> $GITHUB_ENV
          echo "unityPackage=${{ runner.temp }}/${{ steps.pkgName.outputs.value }}-${{ steps.version.outputs.value }}.unitypackage" >> $GITHUB_ENV
          echo "metaList=${{ runner.temp }}/metaList" >> $GITHUB_ENV
          echo "version=${{ steps.version.outputs.value }}" >> $GITHUB_ENV

      # パッケージ本体を zip 化する。配布物に含めない開発用ファイルは除外する。
      - name: Create Package Zip
        run: |
          zip -r "${{ env.zipFile }}" . \
            -x '.git/*' '.github/*' '.gitignore' '.claude/*'

      # .meta 一覧を作り、.unitypackage を生成する（VCC 非利用者向け）
      - name: Track Package Meta Files
        run: find . -name '*.meta' ! -path './.git/*' ! -path './.github/*' > "${{ env.metaList }}"

      - name: Create UnityPackage
        uses: pCYSl5EDgo/create-unitypackage@v1.2.3
        with:
          package-path: ${{ env.unityPackage }}
          include-files: ${{ env.metaList }}

      # package.json の version をタグにする
      - name: Create Tag
        uses: rickstaa/action-create-tag@v1
        with:
          tag: "${{ env.version }}"

      - name: Make Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.zipFile }}
            ${{ env.unityPackage }}
            package.json
          tag_name: ${{ env.version }}
